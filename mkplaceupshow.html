<script>
(function() {

    window.solicitarDados = async function(servico, preenchimentoAutomatico = "") {

        const { value: f } = await Swal.fire({
            title: servico,
            html: `
                <input id="swal-n" class="swal2-input" placeholder="Seu Nome">
                <input id="swal-w" class="swal2-input" type="tel" maxlength="11" placeholder="WhatsApp (DDD + Número)">
                <input id="swal-c" class="swal2-input" placeholder="Cidade">
                <textarea id="swal-p" class="swal2-textarea" placeholder="Descreva sua solicitação...">${preenchimentoAutomatico}</textarea>
            `,
            showCancelButton: true,
            confirmButtonText: 'Enviar Pedido',
            didOpen: () => {
                const inputW = document.getElementById('swal-w');
                inputW.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/\D/g, '');
                });
            },
            preConfirm: () => {
                const nome = document.getElementById('swal-n').value.trim();
                const whats = document.getElementById('swal-w').value.trim();
                const cidade = document.getElementById('swal-c').value.trim();

                if (!nome || !whats || !cidade) {
                    Swal.showValidationMessage('Preencha Nome, WhatsApp e Cidade!');
                    return false;
                }

                if (whats.length < 10) {
                    Swal.showValidationMessage('Digite o DDD + Número completo!');
                    return false;
                }

                return {
                    nome,
                    whats,
                    cidade,
                    desc: document.getElementById('swal-p').value
                };
            }
        });

        if (!f) return;

        Swal.fire({
            title: 'Enviando...',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });

        try {

            const res = await fetch("/api/lead", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({...f, servico})
            });

            if (!res.ok) throw new Error();

            Swal.fire('Sucesso!', 'Seu pedido foi enviado.', 'success');

        } catch(e) {
            console.error(e);
            Swal.fire('Erro!', 'Falha ao enviar.', 'error');
        }
    };

    window.executarBusca = function() {
        const t = document.getElementById('serviceInput').value.trim();
        if (t) solicitarDados('Busca: ' + t);
    };

})();
</script>
