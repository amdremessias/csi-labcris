<script>
    (function() {
        // Webhook do n8n original preservado intocado
        const _u = 'https://n8n.wtichet.online/webhook/dfc1b3f6-4be9-4bc7-95ca-9a3d6fcf4aee';

        window.solicitarDados = async function(servico, descPredefinida = '') {
            const { value: f } = await Swal.fire({
                // Ajustado conforme a primeira imagem: "Solicitar Atendimento para o Serviço X"
                title: `Solicitar Atendimento para o ${servico}`,
                customClass: {
                    popup: 'custom-swal-popup',
                    title: 'custom-swal-title',
                    htmlContainer: 'custom-swal-html'
                },
                background: '#0a0a0a',
                color: '#fff',
                html:
                    '<input id="swal-n" class="custom-swal-input" placeholder="Seu Nome">' +
                    '<input id="swal-w" class="custom-swal-input" type="tel" maxlength="11" placeholder="WhatsApp (DDD + Número sem espaços)" oninput="this.value = this.value.replace(/[^0-9]/g, \'\')">' +
                    '<input id="swal-c" class="custom-swal-input" placeholder="Sua Cidade">' +
                    '<textarea id="swal-p" class="custom-swal-textarea" placeholder="Descreva brevemente sua infraestrutura ou problema técnico..."></textarea>',
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonColor: '#00FF66',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Enviar Solicitação',
                cancelButtonText: 'Cancelar',
                didOpen: () => {
                    if(descPredefinida) {
                        document.getElementById('swal-p').value = descPredefinida;
                    }
                },
                preConfirm: () => {
                    const nome = document.getElementById('swal-n').value.trim();
                    const whats = document.getElementById('swal-w').value.trim();
                    const cidade = document.getElementById('swal-c').value.trim();
                    const desc = document.getElementById('swal-p').value.trim();
                    
                    if(!nome || !whats || !cidade) { 
                        Swal.showValidationMessage('Preencha os campos obrigatórios: Nome, WhatsApp e Cidade!'); 
                        return false; 
                    }
                    if(whats.length !== 11) { 
                        Swal.showValidationMessage('O número deve conter exatamente 11 dígitos numéricos (Ex: 14997135218)!'); 
                        return false; 
                    }
                    return { nome, whats, cidade, desc };
                }
            });

            if (f) {
                Swal.fire({ 
                    title: 'Enviando...', 
                    allowOutsideClick: false, 
                    didOpen: () => Swal.showLoading() 
                });
                
                // Montagem da string do WhatsApp com a estrutura exata exigida
                const textoWpp = `Serviço Solicitado: ${servico}\nNome Cliente: ${f.nome}\nTelefone Wpp: ${f.whats}\nCidade: ${f.cidade}\nDescrição Solicitação: ${f.desc}`;
                const linkWpp = `https://wa.me/5514997135218?text=${encodeURIComponent(textoWpp)}`;

                try {
                    // Envio Primário: Post Assíncrono para o Webhook do n8n
                    await fetch(_u, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({...f, servico}) 
                    });

                    // Fluxo de Sucesso do n8n -> Redireciona em seguida
                    Swal.fire({
                        title: 'Sucesso!',
                        text: 'Seu pedido foi registrado em nossa central. Redirecionando para validação no WhatsApp...',
                        icon: 'success',
                        background: '#0a0a0a',
                        color: '#fff',
                        confirmButtonColor: '#00FF66'
                    }).then(() => {
                        window.open(linkWpp, '_blank');
                    });

                } catch(e) { 
                    // Solução para a segunda imagem: Se falhar o n8n, abre modal alternativo com botão direto para WhatsApp
                    Swal.fire({
                        title: 'Central de Contingência',
                        text: 'Detectamos uma oscilação temporária em nosso servidor principal. Clique no botão abaixo para concluir o envio direto via WhatsApp sem perder seus dados!',
                        icon: 'warning',
                        background: '#0a0a0a',
                        color: '#fff',
                        showCancelButton: true,
                        confirmButtonColor: '#25D366',
                        cancelButtonColor: '#d33',
                        confirmButtonText: 'Enviar via WhatsApp 📞',
                        cancelButtonText: 'Cancelar'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.open(linkWpp, '_blank');
                        }
                    });
                }
            }
        };

        window.executarBusca = function() {
            const t = document.getElementById('serviceInput').value.trim();
            if(t) solicitarDados('Busca Customizada: ' + t);
        };
    })();

    // Header Scroll
    window.addEventListener('scroll', () => {
        const header = document.getElementById('mainHeader');
        if (window.scrollY > 50) header.classList.add('scrolled');
        else header.classList.remove('scrolled');
    });

    // Bloqueio Preventivo de Inspecionar
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false;
        if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    }

    // Framework LGPD
    window.addEventListener('DOMContentLoaded', () => {
        const consent = localStorage.getItem('lgpd_consent');
        if (!consent) {
            setTimeout(() => document.getElementById('cookieBanner').classList.add('active'), 2000);
        } else if (consent === 'accepted_all') {
            updateGoogleConsent(true);
            loadTrackingScripts();
        }
    });

    function respondCookies(acceptAll) {
        const consentStatus = acceptAll ? 'accepted_all' : 'rejected';
        localStorage.setItem('lgpd_consent', consentStatus);
        if(acceptAll) {
            updateGoogleConsent(true);
            loadTrackingScripts();
        } else {
            updateGoogleConsent(false);
        }
        document.getElementById('cookieBanner').classList.remove('active');
    }

    function updateGoogleConsent(accepted) {
        if (typeof gtag === 'function') {
            gtag('consent', 'update', {
                'ad_storage': accepted ? 'granted' : 'denied',
                'ad_user_data': accepted ? 'granted' : 'denied',
                'ad_personalization': accepted ? 'granted' : 'denied',
                'analytics_storage': accepted ? 'granted' : 'denied'
            });
        }
    }

    function loadTrackingScripts() {
        if (!document.getElementById('goatcounter-script')) {
            const script = document.createElement('script');
            script.id = 'goatcounter-script';
            script.async = true;
            script.src = 'https://gc.zgo.at/count.js';
            script.setAttribute('data-goatcounter', 'https://m3ss14s.goatcounter.com/count');
            document.body.appendChild(script);
        }
    }
</script>
