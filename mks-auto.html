<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://raw.githubusercontent.com/amdremessias/csi-labcris/main/images/escudoico.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>MC Services | Marketplace de Técnicos</title>
    <style>
        /* --- ESTILOS REFATORADOS --- */
        body {
            font-family: 'Roboto', sans-serif; margin: 0; padding: 0;
            line-height: 1.6; color: #fff;
            background: #000 url('https://raw.githubusercontent.com/amdremessias/csi-labcris/main/images/bg-home.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: -1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        header { background-color: rgba(0, 0, 0, 0.9); padding: 1rem 0; border-bottom: 1px solid #4CAF50; position: sticky; top: 0; z-index: 1000; }
        header nav { display: flex; justify-content: space-between; align-items: center; }
        header .logo { font-size: 1.5em; font-weight: 700; color: #4CAF50; text-decoration: none; }

        .search-hero { padding: 60px 0 30px; text-align: center; }
        .search-hero h1 { font-size: 2.5rem; color: #0AFF0A; text-shadow: 0 0 15px rgba(10, 255, 10, 0.3); }

        .search-container { max-width: 600px; margin: 20px auto; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #4CAF50; background: rgba(255,255,255,0.1); color: #fff; }
        .btn-search { background: #4CAF50; border: none; padding: 10px 20px; color: #fff; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 30px 0; }
        .cat-card { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(76, 175, 80, 0.2); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .cat-card:hover { border-color: #0AFF0A; transform: translateY(-3px); background: rgba(76, 175, 80, 0.1); }
        .cat-icon { font-size: 2rem; display: block; margin-bottom: 5px; }
        .cat-card h3 { font-size: 0.9rem; margin: 0; color: #4CAF50; }

        /* SweetAlert Custom Dark Mode */
        .swal2-popup { background: #111 !important; color: #fff !important; border: 1px solid #4CAF50 !important; }
        .swal2-title { color: #0AFF0A !important; }
        .swal2-input { color: #fff !important; background: #222 !important; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo">🛠️ Serviço Certo</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="search-hero">
            <h1>Qual serviço você busca?</h1>
            <div class="search-container">
                <input type="text" id="mainSearch" class="search-input" placeholder="Ex: Ar Condicionado, TI, Elétrica...">
                <button class="btn-search" onclick="executarBusca()">Buscar</button>
            </div>
        </section>

        <div id="gridServicos" class="categories-grid">
            </div>
    </main>

    <script>
        const N8N_URL = "https://app-n8n.duckdns.org/webhook/servico-certo-webhook";
        const WHATS_BACKUP = "5514997911398";

        // Lista Centralizada de Serviços (Contempla todos os seus itens)
        const listaServicos = [
            { nome: 'Ar Condicionado', icon: '❄️' },
            { nome: 'Técnico CFTV', icon: '📹' },
            { nome: 'Redes e TI', icon: '🌐' },
            { nome: 'Entregador', icon: '🏍️' },
            { nome: 'Alarme', icon: '🚨' },
            { nome: 'Cerca Elétrica', icon: '⚡' },
            { nome: 'Portão Automático', icon: '🚪' },
            { nome: 'Controle de Acesso', icon: '🔑' },
            { nome: 'Home Automação', icon: '🏠' },
            { nome: 'Monitoramento 24h', icon: '🛡️' },
            { nome: 'Elétrica Básica', icon: '🔌' },
            { nome: 'Jardinagem', icon: '🍃' },
            { nome: 'Serralheiro', icon: '⚙️' },
            { nome: 'Hidráulico', icon: '🚰' },
            { nome: 'Montador de Móveis', icon: '📦' }
        ];

        // Renderiza os cards automaticamente
        function renderizarCards(lista) {
            const grid = document.getElementById('gridServicos');
            grid.innerHTML = lista.map(s => `
                <div class="cat-card" onclick="solicitarDados('${s.nome}')">
                    <span class="cat-icon">${s.icon}</span>
                    <h3>${s.nome}</h3>
                </div>
            `).join('');
        }

        renderizarCards(listaServicos);

        // Lógica de Busca: Se encontrar um serviço exato ou parcial, abre o formulário
        function executarBusca() {
            const termo = document.getElementById('mainSearch').value.toLowerCase().trim();
            if (!termo) return;

            const encontrado = listaServicos.find(s => s.nome.toLowerCase().includes(termo));
            
            if (encontrado) {
                solicitarDados(encontrado.nome);
            } else {
                // Se não estiver na lista fixa, envia o que o usuário digitou
                solicitarDados(termo.charAt(0).toUpperCase() + termo.slice(1));
            }
        }

        async function solicitarDados(servico) {
            const { value: formValues } = await Swal.fire({
                title: `Solicitar ${servico}`,
                html:
                    '<input id="swal-nome" class="swal2-input" placeholder="Seu Nome">' +
                    '<input id="swal-whatsapp" class="swal2-input" placeholder="WhatsApp (14999999999)">',
                focusConfirm: false,
                confirmButtonText: 'Confirmar Pedido',
                preConfirm: () => {
                    const nome = document.getElementById('swal-nome').value.trim();
                    const whatsapp = document.getElementById('swal-whatsapp').value.trim();
                    if (!nome || !whatsapp) {
                        Swal.showValidationMessage('Preencha os dados para contato!');
                    }
                    return { nome, whatsapp }
                }
            });

            if (formValues) {
                dispararWebhook(servico, formValues.nome, formValues.whatsapp);
            }
        }

        async function dispararWebhook(servico, nome, whatsapp) {
            Swal.fire({ title: 'Enviando...', didOpen: () => Swal.showLoading() });

            try {
                // Validação do Webhook via Fetch
                const response = await fetch(N8N_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Mitiga erros de CORS enquanto você ajusta o proxy
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        servico, 
                        cliente_nome: nome, 
                        cliente_whatsapp: whatsapp,
                        origem: "Marketplace_Web",
                        data: new Date().toLocaleString('pt-BR')
                    })
                });

                Swal.fire('Pedido Enviado!', 'Aguarde o contato de um especialista.', 'success');
                
            } catch (error) {
                console.error("Erro no Webhook, acionando fallback.");
                const msg = `Lead do Site: ${nome} deseja ${servico}. WhatsApp: ${whatsapp}`;
                window.open(`https://wa.me/${WHATS_BACKUP}?text=${encodeURIComponent(msg)}`, '_blank');
            }
        }

        // Listener para tecla Enter na busca
        document.getElementById('mainSearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executarBusca();
        });
    </script>
</body>
</html>
