<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://raw.githubusercontent.com/amdremessias/csi-labcris/main/images/escudoico.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>MC Services | Marketplace de Técnicos</title>
    <style>
        /* --- ESTILOS MANTIDOS (PADRÃO MC INFRA TI) --- */
        body {
            font-family: 'Roboto', sans-serif; margin: 0; padding: 0;
            line-height: 1.6; color: #fff;
            background: #000 url('https://raw.githubusercontent.com/amdremessias/csi-labcris/main/images/bg-home.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); z-index: -1; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        header { background-color: rgba(0, 0, 0, 0.9); padding: 1rem 0; border-bottom: 1px solid #4CAF50; position: sticky; top: 0; z-index: 1000; }
        header nav { display: flex; justify-content: space-between; align-items: center; }
        header .logo { font-size: 1.5em; font-weight: 700; color: #4CAF50; text-decoration: none; }
        
        .search-hero { padding: 80px 0 40px; text-align: center; }
        .search-hero h1 { font-size: 3rem; color: #0AFF0A; text-shadow: 0 0 20px rgba(10, 255, 10, 0.4); }

        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin: 40px 0; }
        .cat-card { background: rgba(20, 20, 20, 0.9); border: 1px solid rgba(76, 175, 80, 0.2); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .cat-card:hover { border-color: #0AFF0A; transform: translateY(-5px); background: rgba(76, 175, 80, 0.1); }
        .cat-icon { font-size: 2.2rem; display: block; }
        
        /* Customizando o SweetAlert para o seu tema Dark/Green */
        .swal2-popup { background: #111 !important; color: #fff !important; border: 1px solid #4CAF50 !important; }
        .swal2-title { color: #0AFF0A !important; }
        .swal2-input { color: #fff !important; background: #222 !important; border: 1px solid #444 !important; }
        .swal2-confirm { background-color: #4CAF50 !important; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo">🛠️ Serviço Certo APP</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="search-hero">
            <h1>O que você precisa hoje?</h1>
            <p>Selecione uma categoria e informe seus dados para contato.</p>
        </section>

        <div class="categories-grid">
            <div class="cat-card" onclick="solicitarDados('Ar Condicionado')"><span class="cat-icon">❄️</span><h3>Ar Condicionado</h3></div>
            <div class="cat-card" onclick="solicitarDados('Técnico CFTV')"><span class="cat-icon">📹</span><h3>Técnico CFTV</h3></div>
            <div class="cat-card" onclick="solicitarDados('Redes e TI')"><span class="cat-icon">🌐</span><h3>Redes e TI</h3></div>
            <div class="cat-card" onclick="solicitarDados('Portão Automático')"><span class="cat-icon">🚪</span><h3>Portão Automático</h3></div>
            <div class="cat-card" onclick="solicitarDados('Elétrica Básica')"><span class="cat-icon">🔌</span><h3>Elétrica Básica</h3></div>
            <div class="cat-card" onclick="solicitarDados('Jardinagem')"><span class="cat-icon">🍃</span><h3>Jardinagem</h3></div>
        </div>
    </main>

    <script>
        const N8N_URL = "https://app-n8n.duckdns.org/webhook/servico-certo-webhook";
        const WHATS_BACKUP = "5514997911398";

        async function solicitarDados(servico) {
            const { value: formValues } = await Swal.fire({
                title: `Solicitar ${servico}`,
                html:
                    '<input id="swal-input1" class="swal2-input" placeholder="Seu Nome">' +
                    '<input id="swal-input2" class="swal2-input" placeholder="Seu WhatsApp (ex: 14999999999)">',
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'Enviar Pedido',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    const nome = document.getElementById('swal-input1').value;
                    const whatsapp = document.getElementById('swal-input2').value;
                    if (!nome || !whatsapp) {
                        Swal.showValidationMessage('Por favor, preencha nome e telefone');
                    }
                    return { nome: nome, whatsapp: whatsapp }
                }
            });

            if (formValues) {
                enviarParaN8N(servico, formValues.nome, formValues.whatsapp);
            }
        }

        async function enviarParaN8N(servico, nome, whatsapp) {
            Swal.fire({ title: 'Processando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            try {
                const response = await fetch(N8N_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        servico: servico,
                        cliente_nome: nome,
                        cliente_whatsapp: whatsapp,
                        origem: "Marketplace_Web",
                        data: new Date().toLocaleString('pt-BR')
                    })
                });

                Swal.fire('Sucesso!', 'Seu pedido foi enviado. Entraremos em contato!', 'success');
                
            } catch (error) {
                console.error("Erro n8n, usando backup.");
                const msg = `Olá! Meu nome é ${nome}. Gostaria de um orçamento para ${servico}`;
                window.open(`https://wa.me/${WHATS_BACKUP}?text=${encodeURIComponent(msg)}`, '_blank');
            }
        }
    </script>
</body>
</html>
